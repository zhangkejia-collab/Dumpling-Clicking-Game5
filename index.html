<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>學中文 · 任務闖關</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #5BB8F5;
            --sky-dark: #4AA3E0;
            --grass: #5CA846;
            --grass-dark: #4A9035;
            --grass-check: #52993E;
            --snake-blue: #5C6BC0;
            --btn-blue: #1A73E8;
            --btn-blue-dark: #1557B0;
            --btn-blue-shadow: rgba(26,115,232,0.35);
            --white: #FFFFFF;
            --dark: #2D2D2D;
            --gray: #888;
            --yellow: #FFD93D; --orange: #FF9500;
            --red-ch: #D93025; --green: #34A853; --red-wrong: #EA4335;
            --lv1-color: #1A73E8; --lv2-color: #6B4FBB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito','微軟正黑體',sans-serif;
            background: #2D5016;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #app {
            width: 100%; max-width: 430px; min-height: 100vh;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            background: #FFFBEA;
        }

        /* ════ MAP SCREEN ════ */
        #map-screen {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 0 0 36px; position: relative; background: #2D5016;
        }

        .scene-card {
            width: 100%; background: var(--sky); position: relative; overflow: hidden;
            border-radius: 0 0 20px 20px; flex-shrink: 0; min-height: 240px;
            display: flex; flex-direction: column; justify-content: flex-end;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .score-row {
            display: flex; justify-content: center; gap: 60px;
            padding: 28px 20px 8px; position: relative; z-index: 2;
        }
        .score-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .score-icon { font-size: 44px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2)); }
        .score-num {
            font-family: 'VT323', monospace; /* 使用像素字體 */
            font-size: 36px; color: var(--white);
            text-shadow: 0 3px 0 #000;
            line-height: 1;
        }

        .snake-scene { width: 100%; position: relative; z-index: 2; }
        .grass-strip {
            width: 100%; background: var(--grass); position: relative; overflow: hidden; flex-shrink: 0;
            border-top: 4px solid #3E7A2A;
        }
        .grass-strip::before {
            content: ''; position: absolute; inset: 0;
            background-image:
                linear-gradient(45deg, var(--grass-check) 25%, transparent 25%),
                linear-gradient(-45deg, var(--grass-check) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, var(--grass-check) 75%),
                linear-gradient(-45deg, transparent 75%, var(--grass-check) 75%);
            background-size: 24px 24px;
            background-position: 0 0, 0 12px, 12px -12px, -12px 0px; opacity: 0.4;
        }

        .levels-section { width: 100%; padding: 20px 18px 0; display: flex; flex-direction: column; gap: 14px; position: relative; z-index: 2; }
        .level-btn {
            width: 100%; background: var(--btn-blue); border: none; border-radius: 14px;
            padding: 18px 22px; display: flex; align-items: center; gap: 16px; cursor: pointer;
            box-shadow: 0 4px 0 var(--btn-blue-dark), 0 6px 16px var(--btn-blue-shadow);
            transition: transform 0.12s, box-shadow 0.12s; position: relative; overflow: hidden;
        }
        .level-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--btn-blue-dark), 0 2px 8px var(--btn-blue-shadow); }
        .level-btn.locked { background: #78909C; box-shadow: 0 4px 0 #546E7A; cursor: not-allowed; }
        .level-btn::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: rgba(255,255,255,0.12); border-radius: 14px 14px 0 0; pointer-events: none;
        }
        .btn-icon { width: 52px; height: 52px; border-radius: 12px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
        .level-btn.locked .btn-icon { background: rgba(255,255,255,0.15); filter: grayscale(0.5); }
        .btn-text { flex: 1; text-align: left; }
        .btn-label { font-size: 11px; font-weight: 900; color: rgba(255,255,255,0.75); letter-spacing: 2px; }
        .btn-title { font-size: 20px; font-weight: 900; color: var(--white); }
        .btn-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .btn-stars { font-size: 14px; letter-spacing: 2px; }
        .lock-badge { font-size: 22px; opacity: 0.8; }

        .level-connector { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 2px 0; }
        .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); animation: connPulse 1s ease-in-out infinite alternate; }
        .conn-dot:nth-child(2) { animation-delay: 0.2s; } .conn-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes connPulse { from { transform: scale(0.8); opacity: 0.3; } to { transform: scale(1.1); opacity: 0.7; } }

        /* ════ COMMON SCREENS ════ */
        #level-intro, #quiz-screen, #passage-screen, #level-clear, #end-screen { background: #FFFBEA; }
        #level-intro { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 40px 30px; text-align: center; gap: 18px; }
        .intro-badge { font-size: 13px; font-weight: 900; letter-spacing: 3px; padding: 6px 20px; border-radius: 99px; color: white; }
        .intro-emoji { font-size: 90px; animation: pop 0.5s cubic-bezier(.36,1.6,.6,1); }
        @keyframes pop { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
        .intro-title { font-size: 32px; font-weight: 900; color: var(--dark); }
        .intro-desc { font-size: 17px; font-weight: 700; color: var(--gray); line-height: 1.6; }
        .intro-tip { font-size: 14px; font-weight: 700; padding: 14px 20px; border-radius: 14px; line-height: 1.7; width: 100%; }
        .start-btn { padding: 16px 50px; font-size: 20px; font-weight: 900; font-family: inherit; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.18); transition: transform 0.15s; }
        .start-btn:active { transform: scale(0.96); }

        /* ════ QUIZ SCREEN (LV1) ════ */
        #quiz-screen { display: none; flex-direction: column; flex: 1; position: relative; }
        .quiz-header { padding: 12px 20px 8px; display: flex; align-items: center; gap: 10px; }
        .back-btn { width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer; font-size: 18px; font-weight: 900; }
        .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .progress-label { font-size: 13px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .hp-display { font-size: 14px; letter-spacing: 2px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); }
        .progress-track { height: 10px; border-radius: 99px; background: rgba(0,0,0,0.08); }
        .progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

        /* Combo 動畫提示 */
        .combo-text {
            position: absolute; top: 180px; left: 50%; transform: translate(-50%, -50%);
            font-family: 'VT323', monospace; font-size: 48px; color: #FF9500;
            text-shadow: 0 4px 0 #C84B31, 2px 2px 0 #FFF, -2px -2px 0 #FFF;
            opacity: 0; pointer-events: none; z-index: 10;
        }
        .combo-text.show { animation: comboPop 0.8s ease-out; }
        @keyframes comboPop {
            0% { transform: translate(-50%, -20%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -55%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
        }

        .illustration-area { display: flex; justify-content: center; padding: 8px 0 4px; }
        .illustration-box { font-size: 62px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

        .cards-area { padding: 0 18px; display: flex; flex-direction: column; gap: 12px; }
        .card-question { background: white; border-radius: 20px; padding: 18px 20px; font-size: 24px; font-weight: 900; color: var(--dark); text-align: center; line-height: 1.8; box-shadow: 0 4px 0 #E0E0E0; border: 2.5px solid; min-height: 72px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; }
        .blank-underline { display: inline-block; min-width: 52px; border-bottom: 3px solid var(--red-ch); margin: 0 3px; vertical-align: bottom; padding: 0 5px; color: var(--red-ch); transition: 0.3s; }
        .blank-underline.filled { color: var(--green); border-bottom-color: var(--green); }
        .card-pinyin { background: rgba(255,255,255,0.75); border: 2px dashed #ddd; border-radius: 14px; padding: 9px 18px; font-size: 14px; color: var(--gray); text-align: center; font-style: italic; font-weight: 700; }

        .options-area { padding: 10px 18px 24px; display: grid; gap: 11px; grid-template-columns: 1fr 1fr; }
        .option-btn { background: white; border: 2.5px solid #E0E0E0; border-bottom-width: 6px; border-radius: 16px; padding: 13px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.1s; user-select: none; }
        .option-btn:active { transform: translateY(4px); border-bottom-width: 2.5px; }
        .option-hanzi { font-size: 26px; font-weight: 900; color: var(--dark); }
        .option-pinyin { font-size: 13px; color: var(--gray); font-weight: 700; }
        .option-btn.correct { border-color: var(--green); background: #E8F8EE; }
        .option-btn.correct .option-hanzi { color: var(--green); }
        .option-btn.wrong { border-color: var(--red-wrong); background: #FFE8E6; animation: shake 0.3s; }
        .option-btn.wrong .option-hanzi { color: var(--red-wrong); }
        .option-btn.disabled { pointer-events: none; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

        /* ════ PASSAGE SCREEN (LV2) ════ */
        #passage-screen { display: none; flex-direction: column; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .passage-header { padding: 12px 20px 10px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; background: #FFFBEA; z-index: 10; border-bottom: 2px solid rgba(107,79,187,0.13); }
        .p-progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .p-progress-label { font-size: 13px; font-weight: 800; color: var(--lv2-color); }
        .p-progress-track { height: 10px; border-radius: 99px; background: rgba(0,0,0,0.08); }
        .p-progress-fill { height: 100%; border-radius: 99px; background: var(--lv2-color); transition: width 0.5s; }
        .passage-body { padding: 16px 18px 32px; display: flex; flex-direction: column; gap: 16px; }
        .section-label { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 900; letter-spacing: 2px; color: var(--lv2-color); text-transform: uppercase; }
        .section-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--lv2-color); }
        .passage-card { background: white; border-radius: 18px; border: 2.5px solid var(--lv2-color); padding: 18px; line-height: 2.1; font-size: 17px; font-weight: 700; color: var(--dark); box-shadow: 0 4px 0 rgba(107,79,187,0.2); }
        .questions-block { display: flex; flex-direction: column; gap: 14px; }
        .question-item { background: white; border-radius: 16px; border: 2px solid #DDD8F5; padding: 14px 16px; box-shadow: 0 4px 0 #EAE6FA; }
        .question-num-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
        .q-num { width: 28px; height: 28px; border-radius: 50%; background: var(--lv2-color); color: white; font-size: 14px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .q-text { font-size: 16px; font-weight: 800; color: var(--dark); line-height: 1.5; flex: 1; }
        .answer-input { width: 100%; border: 2.5px solid #D0C8F0; border-radius: 12px; padding: 12px 14px; font-size: 16px; font-family: inherit; font-weight: 700; background: #FAF8FF; resize: none; min-height: 72px; line-height: 1.6; }
        .answer-input:focus { outline: none; border-color: var(--lv2-color); background: white; }
        .ref-answer { margin-top: 10px; padding: 10px 14px; background: #EDE8FF; border-radius: 10px; font-size: 14px; font-weight: 700; color: #5A3F9B; display: none; line-height: 1.6; }
        .ref-answer.show { display: block; animation: pop 0.3s; }
        .submit-section-btn { width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border: none; border-radius: 16px; background: var(--lv2-color); color: white; box-shadow: 0 6px 0 #503A8A; cursor: pointer; transition: 0.1s; }
        .submit-section-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #503A8A; }
        .next-section-btn { width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border: none; border-radius: 16px; background: var(--green); color: white; box-shadow: 0 6px 0 #24823E; cursor: pointer; display: none; transition: 0.1s; }
        .next-section-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #24823E; }

        /* ════ CLEAR / END SCREENS ════ */
        #level-clear, #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 28px; text-align: center; gap: 14px; }
        .clear-emoji { font-size: 80px; animation: pop 0.5s cubic-bezier(.36,1.6,.6,1); }
        .clear-stars { font-size: 42px; letter-spacing: 6px; animation: pop 0.6s 0.1s both cubic-bezier(.36,1.6,.6,1); }
        .clear-title { font-size: 28px; font-weight: 900; color: var(--dark); }
        .clear-sub { font-size: 16px; font-weight: 700; color: var(--gray); line-height: 1.6; }
        .clear-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 8px; }
        .btn-next, .btn-map { padding: 15px; font-size: 18px; font-weight: 900; border: none; border-radius: 16px; cursor: pointer; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: 0.1s; }
        .btn-next:active, .btn-map:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        .btn-map { background: #E0E0E0; color: #666; }

        .game-over-title { color: var(--red-wrong) !important; }

        /* Apple Animation */
        @keyframes floatApple { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes glowApple { 0%,100% { filter: drop-shadow(0 0 4px rgba(229, 57, 53, 0.4)); } 50% { filter: drop-shadow(0 0 12px rgba(229, 57, 53, 0.9)); } }
    </style>
</head>
<body>
<div id="app">

    <div id="map-screen">
        <div class="scene-card">
            <div class="score-row">
                <div class="score-item"><div class="score-icon">🍎</div><div class="score-num" id="score-apples">0</div></div>
                <div class="score-item"><div class="score-icon">🏆</div><div class="score-num" id="score-trophy">0</div></div>
            </div>
            <div class="snake-scene">
                <svg viewBox="0 0 360 120" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
                    <g id="snake-group">
                        <ellipse cx="60" cy="88" rx="26" ry="16" fill="#5C6BC0" opacity="0.7"/>
                        <ellipse cx="90" cy="88" rx="30" ry="18" fill="#5C6BC0" opacity="0.8"/>
                        <ellipse cx="125" cy="88" rx="34" ry="20" fill="#5C6BC0" opacity="0.9"/>
                        <ellipse cx="170" cy="86" rx="55" ry="22" fill="#5C6BC0"/>
                        <ellipse cx="225" cy="84" rx="50" ry="22" fill="#5C6BC0"/>
                        <ellipse cx="272" cy="82" rx="32" ry="20" fill="#5C6BC0"/>
                        <ellipse cx="305" cy="78" rx="36" ry="22" fill="#6772C8"/>
                        <ellipse cx="299" cy="72" rx="18" ry="10" fill="#7B86D4" opacity="0.5"/>
                        <circle cx="315" cy="72" r="8" fill="white"/> <circle cx="327" cy="72" r="8" fill="white"/>
                        <circle cx="317" cy="72" r="4" fill="#1A237E"/> <circle cx="329" cy="72" r="4" fill="#1A237E"/>
                        <circle cx="318" cy="70" r="1.5" fill="white"/> <circle cx="330" cy="70" r="1.5" fill="white"/>
                        <path d="M 300 86 Q 308 92 318 88" stroke="#3949AB" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </g>
                    <g style="animation: floatApple 2.5s ease-in-out infinite, glowApple 1.5s ease-in-out infinite;">
                        <circle cx="80" cy="38" r="18" fill="#E53935"/>
                        <circle cx="74" cy="28" r="7" fill="#C62828"/>
                        <rect x="79" y="18" width="3" height="10" rx="1.5" fill="#4CAF50"/>
                        <ellipse cx="86" cy="22" rx="7" ry="4" fill="#66BB6A" transform="rotate(-20 86 22)"/>
                    </g>
                </svg>
            </div>
            <div class="grass-strip" style="height:52px;"></div>
        </div>
        <div class="levels-section">
            <button class="level-btn" id="btn-lv1" onclick="startLevelIntro(0)">
                <div class="btn-icon">🕹️</div>
                <div class="btn-text">
                    <div class="btn-label">STAGE 1</div>
                    <div class="btn-title">生詞填空</div>
                </div>
                <div class="btn-right"><div class="btn-stars" id="stars-0">⭐⭐⭐</div></div>
            </button>
            <div class="level-connector"><div class="conn-dot"></div><div class="conn-dot"></div><div class="conn-dot"></div></div>
            <button class="level-btn locked" id="btn-lv2" onclick="startLevelIntro(1)">
                <div class="btn-icon">📖</div>
                <div class="btn-text">
                    <div class="btn-label">STAGE 2</div>
                    <div class="btn-title">段落問答</div>
                </div>
                <div class="btn-right"><div class="lock-badge" id="lock-badge-1">🔒</div></div>
            </button>
        </div>
    </div>

    <div id="level-intro">
        <div class="intro-badge" id="intro-badge"></div>
        <div class="intro-emoji" id="intro-emoji"></div>
        <div class="intro-title" id="intro-title"></div>
        <div class="intro-desc" id="intro-desc"></div>
        <div class="intro-tip" id="intro-tip"></div>
        <button class="start-btn" id="intro-start-btn" onclick="beginLevel()">START 🚀</button>
    </div>

    <div id="quiz-screen">
        <div class="combo-text" id="combo-text">2 COMBO!</div>
        <div class="quiz-header">
            <button class="back-btn" id="quiz-back-btn" onclick="goToMap()">←</button>
            <div class="progress-wrap">
                <div class="progress-label">
                    <span id="progress-text"></span>
                    <span class="hp-display" id="hp-display">❤️❤️❤️</span>
                </div>
                <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
            </div>
            <div style="font-size:22px">🕹️</div>
        </div>
        <div class="illustration-area"><div class="illustration-box" id="q-emoji">🥟</div></div>
        <div class="cards-area">
            <div class="card-question" id="card-question"></div>
            <div class="card-pinyin" id="card-pinyin"></div>
        </div>
        <div class="options-area" id="options-container"></div>
    </div>

    <div id="passage-screen">
        <div class="passage-header">
            <button class="back-btn" style="background:#EDE8FF;color:#6B4FBB;" onclick="goToMap()">←</button>
            <div class="p-progress-wrap">
                <div class="p-progress-label" id="p-progress-label">第一段 · 共三段</div>
                <div class="p-progress-track"><div class="p-progress-fill" id="p-progress-fill" style="width:33%"></div></div>
            </div>
            <div style="font-size:22px">📖</div>
        </div>
        <div class="passage-body" id="passage-body"></div>
    </div>

    <div id="level-clear">
        <div class="clear-emoji" id="clear-emoji">🎉</div>
        <div class="clear-stars" id="clear-stars">⭐⭐⭐</div>
        <div class="clear-title" id="clear-title"></div>
        <div class="clear-sub" id="clear-sub"></div>
        <div class="clear-btns">
            <button class="btn-next" id="btn-next" onclick="goNextLevel()"></button>
            <button class="btn-map" onclick="goToMap()">回地圖</button>
        </div>
    </div>

    <div id="end-screen">
        <div class="end-emoji">🏆</div>
        <h1>MISSION CLEAR!</h1>
        <p>太棒了！你已完成所有任務！</p>
        <button class="start-btn" style="background:var(--orange); box-shadow:0 6px 0 #C84B31;" onclick="resetAll()">PLAY AGAIN 🔄</button>
    </div>
</div>

<script>
const QUIZ_QUESTIONS = [
    { emoji:"🥟", part1:"他們去張老師家", part2:"餃子。", answer:"包", options:[{hanzi:"包",pinyin:"bāo"},{hanzi:"洗",pinyin:"xǐ"},{hanzi:"煮",pinyin:"zhǔ"},{hanzi:"脫",pinyin:"tuō"}] },
    { emoji:"🥗", part1:"張老師已經把", part2:"跟餃子皮都準備好了。", answer:"餡兒", options:[{hanzi:"材料",pinyin:"cáiliào"},{hanzi:"餡兒",pinyin:"xiànr"},{hanzi:"鍋子",pinyin:"guōzi"},{hanzi:"碗",pinyin:"wǎn"}] },
    { emoji:"🍳", part1:"先把大白菜", part2:"乾淨，加鹽拌一拌。", answer:"洗", options:[{hanzi:"做",pinyin:"zuò"},{hanzi:"包",pinyin:"bāo"},{hanzi:"洗",pinyin:"xǐ"},{hanzi:"煮",pinyin:"zhǔ"}] },
    { emoji:"🍜", part1:"水開了以後，把餃子放進去", part2:"十分鐘。", answer:"煮", options:[{hanzi:"煮",pinyin:"zhǔ"},{hanzi:"包",pinyin:"bāo"},{hanzi:"切",pinyin:"qiē"},{hanzi:"拌",pinyin:"bàn"}] },
    { emoji:"🥬", part1:"大家嚐了泡菜都說", part2:"李東健會做泡菜。", answer:"看不出來", options:[{hanzi:"看不出來",pinyin:"kàn bù chūlái"},{hanzi:"吃不下去",pinyin:"chī bù xiàqù"},{hanzi:"做不出來",pinyin:"zuò bù chūlái"},{hanzi:"買不到",pinyin:"mǎi bú dào"}] },
    { emoji:"🎉", part1:"同學們都覺得這個學期", part2:"，學到了很多。", answer:"過得很充實", options:[{hanzi:"過得很充實",pinyin:"guò de hěn chōngshí"},{hanzi:"作業太多",pinyin:"zuòyè tài duō"},{hanzi:"假期太短",pinyin:"jiàqī tài duǎn"},{hanzi:"考試很難",pinyin:"kǎoshì hěn nán"}] }
];

const PASSAGE_DATA = [
    { sectionLabel:"第一段", emoji:"🥟", passage:"這個學期，馬丁、陳月美、高美玲和李東健都是張老師的學生，他們趁學期結束以前的一個週末，到張老師家包餃子。張老師已經把餃子餡兒跟餃子皮都準備好了。到了老師家以後，張老師就教他們怎麼包餃子，怎麼把餃子包得好看，怎麼包不容易煮破。", questions:[ {q:"這個學期，張老師的學生有哪些人？（四個人）",ref:"馬丁、陳月美、高美玲和李東健。"}, {q:"他們趁學期結束以前的週末做什麼？",ref:"他們去張老師家包餃子。"}, {q:"張老師把餃子餡和餃子皮準備好了嗎？",ref:"準備好了。張老師已經把餃子餡兒跟餃子皮都準備好了。"}, {q:"到了老師家以後，張老師教他們什麼？（三句話）",ref:"①怎麼包餃子 ②怎麼把餃子包得好看 ③怎麼包不容易煮破。"} ]},
    { sectionLabel:"第二段", emoji:"🥬", passage:"除了包餃子，李東健跟陳月美還帶了自己做的韓國泡菜和越南春捲請大家吃。大家嚐了泡菜都說看不出來李東健會做泡菜。李東健說他是跟媽媽學的，做起來不太難。先把大白菜洗乾淨，加鹽拌一拌，再放辣椒和調味料，最後裝進玻璃或是塑膠罐裡，放一下就可以吃了。", questions:[ {q:"為什麼大家看不出來東健會做泡菜？",ref:"因為泡菜是韓國食物，大家沒想到外國留學生李東健會做。"}, {q:"東健覺得泡菜做起來難不難？",ref:"不太難。李東健說做起來不太難，是跟媽媽學的。"}, {q:"你覺得春捲做起來簡單（容易）嗎？",ref:"（開放性問題，請用自己的話回答）"}, {q:"東健和月美帶了什麼請大家吃？",ref:"李東健帶了韓國泡菜，陳月美帶了越南春捲。"}, {q:"東健的媽媽覺得泡菜要怎麼做？（四個步驟）",ref:"①把大白菜洗乾淨 ②加鹽拌一拌 ③放辣椒和調味料 ④裝進玻璃或塑膠罐，放一下就好了。"} ]},
    { sectionLabel:"第三段", emoji:"🍱", passage:"張老師也說，像中國的餃子、韓國的泡菜，或是越南的春捲、日本的壽司，材料很容易買得到，做起來也不難，都是大家常吃的食物。", questions:[ {q:"餃子、泡菜、春捲和壽司，這些東西的材料在台灣買得到買不到？",ref:"買得到。張老師說這些食物的材料很容易買得到。"}, {q:"這些食物，做起來難嗎？",ref:"不難。張老師說做起來也不難。"}, {q:"張老師覺得大家常吃哪些食物？你常吃什麼？",ref:"張老師說餃子、泡菜、春捲、壽司都是大家常吃的食物。（第二題請自由回答）"} ]}
];

let levelProgress = [true, false];
let levelCleared  = [false, false];
let currentLevel  = 0;
let currentQIndex = 0;
let currentSection = 0;

// 新增遊戲變數
let playerHP = 3;
let currentCombo = 0;
let applesCollected = 0;

const screens = {
    map: document.getElementById('map-screen'), intro: document.getElementById('level-intro'),
    quiz: document.getElementById('quiz-screen'), passage: document.getElementById('passage-screen'),
    clear: document.getElementById('level-clear'), end: document.getElementById('end-screen')
};

function showOnly(id) {
    Object.values(screens).forEach(s => s.style.display = 'none');
    const el = screens[id];
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    if (id === 'passage') el.scrollTop = 0;
}

function renderMap() {
    showOnly('map');
    document.getElementById('score-apples').textContent = applesCollected;
    document.getElementById('score-trophy').textContent = levelCleared.filter(Boolean).length;
    document.getElementById('stars-0').textContent = levelCleared[0] ? '⭐⭐⭐' : '⭐⭐⭐';

    const btn2 = document.getElementById('btn-lv2');
    const lock = document.getElementById('lock-badge-1');
    btn2.classList.remove('locked');
    if (!levelProgress[1]) {
        btn2.classList.add('locked'); lock.style.display = '';
    } else {
        lock.style.display = 'none';
        btn2.querySelector('.btn-right').innerHTML = `<div class="btn-stars" id="stars-1">${levelCleared[1]?'⭐⭐⭐':'⭐⭐⭐'}</div>`;
    }
}

function startLevelIntro(idx) {
    if (!levelProgress[idx]) return;
    currentLevel = idx;
    const configs = [
        { badge:'STAGE 1 · 生詞填空', bg:'#1A73E8', emoji:'🕹️', title:'生詞填空', desc:'保護你的 3 顆愛心！選出正確的生詞，不要被扣血啦！', tip:'💡 連續答對可以獲得 COMBO 加成喔！', tipBg:'#E8F0FE', tipColor:'#1A73E8', btnBg:'var(--btn-blue)' },
        { badge:'STAGE 2 · 段落問答', bg:'#6B4FBB', emoji:'📖', title:'段落問答', desc:'閱讀三段短文，用中文簡答每個問題！', tip:'💡 讀完段落後，用自己的話回答，答完再看參考答案', tipBg:'#EDE8FF', tipColor:'#6B4FBB', btnBg:'var(--lv2-color)' }
    ];
    const c = configs[idx];
    document.getElementById('intro-badge').textContent = c.badge;
    document.getElementById('intro-badge').style.background = c.bg;
    document.getElementById('intro-emoji').textContent = c.emoji;
    document.getElementById('intro-title').textContent = c.title;
    document.getElementById('intro-desc').textContent = c.desc;
    document.getElementById('intro-tip').textContent = c.tip;
    document.getElementById('intro-tip').style.background = c.tipBg;
    document.getElementById('intro-tip').style.color = c.tipColor;
    document.getElementById('intro-start-btn').style.background = c.btnBg;
    document.getElementById('intro-start-btn').style.boxShadow = `0 6px 0 ${c.bg === '#1A73E8' ? '#1557B0' : '#503A8A'}`;
    showOnly('intro');
}

function beginLevel() {
    if (currentLevel === 0) beginQuiz();
    else beginPassage();
}

function beginQuiz() {
    currentQIndex = 0; playerHP = 3; currentCombo = 0;
    updateHPDisplay();
    document.getElementById('progress-fill').style.background = '#1A73E8';
    document.getElementById('quiz-back-btn').style.background = '#E8F0FE';
    document.getElementById('quiz-back-btn').style.color = '#1A73E8';
    document.querySelector('.progress-label').style.color = '#1A73E8';
    document.getElementById('card-question').style.borderColor = '#1A73E8';
    showOnly('quiz');
    loadQuestion();
}

function updateHPDisplay() {
    document.getElementById('hp-display').textContent = '❤️'.repeat(playerHP) + '🖤'.repeat(3 - playerHP);
}

function triggerCombo() {
    if (currentCombo < 2) return;
    const comboEl = document.getElementById('combo-text');
    comboEl.textContent = `${currentCombo} COMBO!`;
    comboEl.classList.remove('show');
    void comboEl.offsetWidth; // trigger reflow
    comboEl.classList.add('show');
}

function loadQuestion() {
    const q = QUIZ_QUESTIONS[currentQIndex];
    const total = QUIZ_QUESTIONS.length;
    document.getElementById('progress-text').textContent = `第 ${currentQIndex+1} / ${total} 題`;
    document.getElementById('progress-fill').style.width = `${(currentQIndex/total)*100}%`;
    document.getElementById('q-emoji').textContent = q.emoji;
    document.getElementById('card-question').innerHTML = `${q.part1}<span class="blank-underline" id="blank">　　</span>${q.part2}`;
    const correct = q.options.find(o => o.hanzi === q.answer);
    document.getElementById('card-pinyin').textContent = `提示拼音：${correct ? correct.pinyin : ''}`;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    [...q.options].sort(() => Math.random() - 0.5).forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        btn.innerHTML = `<div class="option-hanzi">${opt.hanzi}</div><div class="option-pinyin">${opt.pinyin}</div>`;
        btn.addEventListener('click', () => checkAnswer(btn, opt.hanzi, q.answer));
        container.appendChild(btn);
    });
}

function checkAnswer(clickedBtn, selected, correct) {
    if (selected === correct) {
        clickedBtn.classList.add('correct');
        document.getElementById('blank').textContent = correct;
        document.getElementById('blank').classList.add('filled');
        document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
        document.getElementById('progress-fill').style.width = `${((currentQIndex+1)/QUIZ_QUESTIONS.length)*100}%`;
        
        applesCollected++; // 答對獲得蘋果
        currentCombo++;
        triggerCombo();

        setTimeout(() => { 
            currentQIndex++; 
            if(currentQIndex < QUIZ_QUESTIONS.length) loadQuestion(); 
            else showLevelClear(true); 
        }, 1000);
    } else {
        clickedBtn.classList.add('wrong');
        currentCombo = 0;
        playerHP--;
        updateHPDisplay();
        if (playerHP <= 0) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
            setTimeout(() => showGameOver(), 800);
        }
    }
}

function showGameOver() {
    document.getElementById('clear-emoji').textContent = '💀';
    document.getElementById('clear-stars').textContent = '愛心耗盡了';
    document.getElementById('clear-title').textContent = 'GAME OVER';
    document.getElementById('clear-title').classList.add('game-over-title');
    document.getElementById('clear-sub').textContent = '別氣餒，再試一次吧！';
    
    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = '重新挑戰 🔄';
    btnNext.style.background = 'var(--red-wrong)';
    btnNext.style.boxShadow = '0 6px 0 #C62828';
    btnNext.onclick = () => { document.getElementById('clear-title').classList.remove('game-over-title'); beginQuiz(); };
    showOnly('clear');
}

function beginPassage() { currentSection = 0; showOnly('passage'); renderSection(); }

function renderSection() {
    const sec = PASSAGE_DATA[currentSection]; const total = PASSAGE_DATA.length; const isLast = currentSection === total - 1;
    document.getElementById('p-progress-label').textContent = `${sec.sectionLabel} · 共 ${total} 段`;
    document.getElementById('p-progress-fill').style.width = `${((currentSection+1)/total)*100}%`;
    const body = document.getElementById('passage-body'); body.innerHTML = '';
    body.appendChild(Object.assign(document.createElement('div'), {innerHTML:`<div class="section-label"><div class="section-dot"></div>${sec.emoji} ${sec.sectionLabel}</div>`}));
    body.appendChild(Object.assign(document.createElement('div'), {className:'passage-card', textContent:sec.passage}));
    body.appendChild(Object.assign(document.createElement('div'), {innerHTML:`<div class="section-label" style="margin-top:2px"><div class="section-dot"></div>📝 回答問題</div>`}));
    const qBlock = document.createElement('div'); qBlock.className = 'questions-block';
    sec.questions.forEach((item, i) => {
        qBlock.appendChild(Object.assign(document.createElement('div'), {className:'question-item', innerHTML:`<div class="question-num-row"><div class="q-num">${i+1}</div><div class="q-text">${item.q}</div></div><textarea class="answer-input" id="ans-${i}" placeholder="請用中文回答…" oninput="this.classList.toggle('answered',this.value.trim().length>0)"></textarea><div class="ref-answer" id="ref-${i}"><b>✦ 參考答案</b><br>${item.ref}</div>`}));
    });
    body.appendChild(qBlock);
    const submitBtn = document.createElement('button'); submitBtn.className = 'submit-section-btn'; submitBtn.textContent = '對答案，看參考答案 ✦';
    const nextBtn = document.createElement('button'); nextBtn.className = 'next-section-btn'; nextBtn.textContent = isLast ? '完成篇章任務 🎉' : `繼續 ${PASSAGE_DATA[currentSection+1].sectionLabel} →`;
    submitBtn.onclick = () => {
        for (let i = 0; i < sec.questions.length; i++) document.getElementById('ref-'+i).classList.add('show');
        submitBtn.style.display = 'none'; nextBtn.style.display = 'block';
        setTimeout(() => document.getElementById('ref-0').scrollIntoView({behavior:'smooth',block:'center'}), 100);
    };
    nextBtn.onclick = () => { if (isLast) showLevelClear(true); else { currentSection++; document.getElementById('passage-screen').scrollTop=0; renderSection(); } };
    body.appendChild(submitBtn); body.appendChild(nextBtn);
    document.getElementById('passage-screen').scrollTop = 0;
}

function showLevelClear(isSuccess) {
    if(!isSuccess) return;
    levelCleared[currentLevel] = true;
    if (currentLevel + 1 < 2) levelProgress[currentLevel+1] = true;
    const isLast = currentLevel === 1;
    document.getElementById('clear-title').classList.remove('game-over-title');
    document.getElementById('clear-emoji').textContent = isLast ? '🏆' : '🎉';
    
    // 依據剩餘血量給星星
    let stars = '⭐⭐⭐';
    if(currentLevel === 0) {
        if(playerHP === 2) stars = '⭐⭐';
        if(playerHP === 1) stars = '⭐';
    }
    document.getElementById('clear-stars').textContent = stars;
    
    document.getElementById('clear-title').textContent = 'STAGE CLEAR!';
    document.getElementById('clear-sub').textContent = isLast ? '你已完成所有任務！' : '新關卡已解鎖！';
    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = isLast ? '查看成果 🏆' : 'NEXT STAGE →';
    btnNext.style.background = isLast ? 'var(--orange)' : 'var(--lv2-color)';
    btnNext.style.boxShadow = isLast ? '0 6px 0 #C84B31' : '0 6px 0 #503A8A';
    btnNext.onclick = goNextLevel;
    showOnly('clear');
}

function goNextLevel() { if (currentLevel===1){showOnly('end');return;} currentLevel++; startLevelIntro(currentLevel); }
function goToMap() { renderMap(); }
function resetAll() { levelProgress=[true,false]; levelCleared=[false,false]; applesCollected=0; renderMap(); }
window.onload = () => renderMap();
</script>
</body>
</html>
